name: 1 - Generar clave de firma

on:
  workflow_dispatch:

jobs:
  keygen:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore and print base64
        env:
          KSPASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KSPASS" ]; then
            echo "ERROR: primero anade el secret KEYSTORE_PASSWORD en Settings > Secrets and variables > Actions."
            exit 1
          fi
          keytool -genkeypair -v -keystore astrella-upload.jks -alias astrella \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KSPASS" -keypass "$KSPASS" \
            -dname "CN=Astrella Games, OU=Indie, O=Astrella Games, L=City, S=State, C=ES"
          echo ""
          echo "================ COPIA TODO LO DE ABAJO EN UN SECRET LLAMADO KEYSTORE_BASE64 ================"
          base64 -w0 astrella-upload.jks
          echo ""
          echo "================ FIN ================"

      - name: Upload keystore artifact (guardalo a buen recaudo)
        uses: actions/upload-artifact@v4
        with:
          name: astrella-upload-keystore
          path: astrella-upload.jks
