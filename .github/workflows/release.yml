name: 2 - Compilar AAB firmado (Play Store)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Check secrets
        env:
          KSB64: ${{ secrets.KEYSTORE_BASE64 }}
          KSPASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KSB64" ] || [ -z "$KSPASS" ]; then
            echo "ERROR: faltan los secrets KEYSTORE_PASSWORD y/o KEYSTORE_BASE64."
            exit 1
          fi

      - name: Generate Android project
        run: |
          set -e
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/launion/astrella
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/xml

          cp astrella.html app/src/main/assets/index.html

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Astrella"
          include ':app'
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=false
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2'
          }
          android {
              namespace 'com.launion.astrella'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.launion.astrella'
                  minSdk 21
                  targetSdk 34
                  versionCode VERSION_CODE_PLACEHOLDER
                  versionName "1.3.VERSION_CODE_PLACEHOLDER"
              }
              signingConfigs {
                  release {
                      storeFile file("astrella-upload.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias "astrella"
                      keyPassword System.getenv("KEYSTORE_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF
          sed -i "s/VERSION_CODE_PLACEHOLDER/${{ github.run_number }}/g" app/build.gradle

          cat > app/src/main/res/xml/backup_rules.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <exclude domain="file" path="no_backup"/>
          </full-backup-content>
          EOF

          cat > app/src/main/res/xml/data_extraction_rules.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup/>
              <device-transfer/>
          </data-extraction-rules>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application
                  android:allowBackup="true"
                  android:fullBackupContent="@xml/backup_rules"
                  android:dataExtractionRules="@xml/data_extraction_rules"
                  android:icon="@drawable/app_icon"
                  android:roundIcon="@drawable/app_icon"
                  android:label="Astrella"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/launion/astrella/MainActivity.java <<'EOF'
          package com.launion.astrella;

          import android.app.Activity;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebView;
          import android.webkit.WebSettings;

          public class MainActivity extends Activity {
              private WebView web;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  web = new WebView(this);
                  WebSettings s = web.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  web.setBackgroundColor(0xFF0E1020);
                  web.loadUrl("file:///android_asset/index.html");
                  setContentView(web);
                  hideSystemUI();
              }

              private void hideSystemUI() {
                  View d = getWindow().getDecorView();
                  d.setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                      | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                      | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                      | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                      | View.SYSTEM_UI_FLAG_FULLSCREEN
                      | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) hideSystemUI();
              }

              @Override
              public void onBackPressed() {
                  if (web != null && web.canGoBack()) web.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

          cat > app/src/main/res/drawable/app_icon.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#0E1020" android:pathData="M0,0h108v108h-108z"/>
              <path
                  android:fillColor="#FFD24A"
                  android:pathData="M54,22 L62.4,44.1 L86,45.6 L67.6,60.4 L73.6,83.2 L54,70.4 L34.4,83.2 L40.4,60.4 L22,45.6 L45.6,44.1 Z"/>
          </vector>
          EOF

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/astrella-upload.jks

      - name: Build signed AAB and APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: gradle bundleRelease assembleRelease --no-daemon --stacktrace

      - name: Collect outputs
        run: |
          mkdir -p out
          cp app/build/outputs/bundle/release/app-release.aab "out/Astrella-release.aab"
          cp app/build/outputs/apk/release/app-release.apk "out/Astrella-release.apk"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Astrella-signed
          path: out/*

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Astrella release ${{ github.run_number }} (firmado)
          files: out/*
